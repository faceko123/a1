<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-card">
  <div class="form-side">
    <h1>Login</h1>

    <div class="input-field">
      <label>Email</label>
      <input id="email" type="email">
    </div>

    <div class="input-field">
      <label>Password</label>
      <input id="pass" type="password">
    </div>

    <button class="signup-btn" onclick="login()">Login</button>

    <p class="footer-text">
      Don't have account? <a href="register.html">Sign Up</a>
    </p>
  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
