<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Việt Social Services</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<!-- Loader -->
<div id="loader" class="loader">
    <div class="loader-content">
        <i class="fas fa-rocket loader-icon"></i>
        <p>Đang tải...</p>
    </div>
</div>

<!-- Header -->
<header class="header">
    <nav class="navbar">
        <h2>Thanh Việt</h2>

        <ul class="nav-menu">
            <li><a href="#home">Trang chủ</a></li>
            <li><a href="#services">Dịch vụ</a></li>
            <li><a href="#contact">Liên hệ</a></li>
        </ul>

        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>
</header>

<!-- Hero -->
<section id="home" class="hero">
    <h1>Tăng Tốc Social Media</h1>

    <div class="hero-stats">
        <div class="stat-number" data-target="500000">0</div>
        <div class="stat-number" data-target="10000000">0</div>
        <div class="stat-number" data-target="99">0</div>
    </div>
</section>

<!-- Order -->
<section id="order" class="order">
    <form id="orderForm">
        <select id="serviceSelect" required>
            <option value="">Chọn dịch vụ</option>
            <option value="tiktok">TikTok</option>
        </select>

        <input type="url" id="linkInput" placeholder="Link" required>
        <input type="number" id="quantityInput" placeholder="Số lượng" required>

        <button type="submit">Đặt hàng</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
