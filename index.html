<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-card" style="justify-content:center; align-items:center; flex-direction:column;">
  <h1>Welcome 👋</h1>

  <button class="signup-btn" onclick="goRegister()">Đăng ký</button>
  <button class="signup-btn" onclick="goLogin()" style="margin-top:10px;">Đăng nhập</button>

</div>

<script>
function goRegister() {
  window.location.href = "register.html";
}

function goLogin() {
  window.location.href = "login.html";
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "quanli-3990e.firebaseapp.com",
  projectId: "quanli-3990e",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// nếu đã login → tự chuyển trang
onAuthStateChanged(auth, (user) => {
  if (user) {
    if (user.email === "admin@gmail.com") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "home.html";
    }
  }
});
</script>
  
</body>
</html>
